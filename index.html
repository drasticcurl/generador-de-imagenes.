<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Creativos - Gemini AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>Generador de Creativos</h1>
            <p class="subtitle">Genera imágenes en lote con Gemini AI</p>
        </header>

        <!-- Config Panel -->
        <section class="config-panel">
            <div class="config-row">
                <div class="config-item">
                    <label for="api-key">API Key de Gemini</label>
                    <div class="api-key-wrapper">
                        <input type="password" id="api-key" placeholder="Ingresá tu API key...">
                        <button id="toggle-key" class="btn-icon" title="Mostrar/Ocultar">👁</button>
                        <button id="save-key" class="btn-small">Guardar</button>
                    </div>
                    <span class="hint" id="key-status">No guardada</span>
                </div>
            </div>
            <div class="config-row">
                <div class="config-item">
                    <label for="model-select">Modelo</label>
                    <select id="model-select">
                        <option value="gemini-3.1-flash-image-preview">Flash (rápido)</option>
                        <option value="gemini-3-pro-image-preview">Pro (calidad)</option>
                    </select>
                </div>
                <div class="config-item">
                    <label for="aspect-select">Proporción</label>
                    <select id="aspect-select">
                        <option value="1:1">1:1 (Feed)</option>
                        <option value="4:5">4:5 (Feed vertical)</option>
                        <option value="9:16">9:16 (Story/Reel)</option>
                        <option value="16:9">16:9 (Landscape)</option>
                    </select>
                </div>
                <div class="config-item">
                    <label for="quality-select">Calidad</label>
                    <select id="quality-select">
                        <option value="1k">1K</option>
                        <option value="2k">2K</option>
                    </select>
                </div>
            </div>
            <!-- Cloudinary Config -->
            <div class="config-row cloudinary-config">
                <div class="config-item">
                    <label for="cloudinary-cloud-name">☁️ Cloudinary Cloud Name</label>
                    <input type="text" id="cloudinary-cloud-name" placeholder="tu-cloud-name">
                </div>
                <div class="config-item">
                    <label for="cloudinary-upload-preset">Upload Preset (unsigned)</label>
                    <input type="text" id="cloudinary-upload-preset" placeholder="tu-upload-preset">
                </div>
                <div class="config-item config-item-btn">
                    <button id="save-cloudinary" class="btn-small">Guardar Cloudinary</button>
                    <span class="hint" id="cloudinary-status">No configurado</span>
                </div>
            </div>
        </section>

        <!-- Input Panel -->
        <section class="input-panel">
            <label for="md-input">Pegá tu documento MD con los creativos:</label>
            <textarea id="md-input" placeholder="## Creative 91: Protocolo vs. Nutricionista&#10;&#10;**Angle:** Comparison...&#10;&#10;### Visual Prompt (for AI image generation)&#10;&#10;**Visual idea:**&#10;..."></textarea>
            <div class="input-actions">
                <span class="creative-count" id="creative-count">0 creativos detectados</span>
                <button id="btn-generate" class="btn-primary" disabled>Generar Creativos</button>
            </div>
        </section>

        <!-- Progress Panel -->
        <section class="progress-panel" id="progress-panel" style="display:none;">
            <h2>Progreso de Generación</h2>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p class="progress-text" id="progress-text">Iniciando...</p>
            <div class="batch-log" id="batch-log"></div>
        </section>

        <!-- Gallery Panel -->
        <section class="gallery-panel" id="gallery-panel" style="display:none;">
            <div class="gallery-header">
                <h2>Revisión de Creativos</h2>
                <div class="gallery-actions">
                    <button id="btn-upload-cloudinary" class="btn-cloudinary">☁️ Subir a Cloudinary</button>
                    <button id="btn-download-approved" class="btn-secondary">Descargar Aprobados</button>
                    <button id="btn-new-batch" class="btn-secondary">Nuevo Lote</button>
                </div>
            </div>
            <div class="gallery-grid" id="gallery-grid"></div>
        </section>
        <!-- Upload Progress Panel -->
        <section class="upload-panel" id="upload-panel" style="display:none;">
            <h2>☁️ Subida a Cloudinary</h2>
            <div class="progress-bar-container">
                <div class="progress-bar" id="upload-progress-bar"></div>
            </div>
            <p class="progress-text" id="upload-progress-text">Subiendo...</p>
            <div class="upload-results" id="upload-results"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
